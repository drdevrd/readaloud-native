name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Install Gradle 8.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
          unzip -q gradle-8.1-bin.zip
          export PATH=$PWD/gradle-8.1/bin:$PATH
          echo "$PWD/gradle-8.1/bin" >> $GITHUB_PATH
      - name: Create keystore
        run: |
          mkdir -p app
          keytool -genkeypair -v \
            -keystore app/readaloud.keystore \
            -alias readaloud \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=ReadAloud, OU=Android, O=ReadAloud, L=Coimbatore, S=TN, C=IN"
      - name: Build APK
        run: |
          gradle-8.1/bin/gradle assembleDebug \
            -Pandroid.injected.signing.store.file=$PWD/app/readaloud.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=readaloud \
            -Pandroid.injected.signing.key.password=android123 \
            --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReadAloud-AI
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
